<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Task Manager</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-brand">
        <div class="logo" aria-hidden="true">✓</div>
        <div>
          <h1>Daily Tasks</h1>
          <p class="subtitle" id="date-display"></p>
        </div>
      </div>
      <div class="header-actions">
        <button type="button" class="icon-btn" id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">
          <span class="theme-icon">🌙</span>
        </button>
      </div>
    </header>

    <aside class="sidebar">
      <nav class="filters" aria-label="Task filters">
        <button type="button" class="filter-btn active" data-filter="today">
          <span class="filter-icon">☀️</span>
          <span class="filter-label">Today</span>
          <span class="filter-count" id="count-today">0</span>
        </button>
        <button type="button" class="filter-btn" data-filter="all">
          <span class="filter-icon">📋</span>
          <span class="filter-label">All Tasks</span>
          <span class="filter-count" id="count-all">0</span>
        </button>
        <button type="button" class="filter-btn" data-filter="upcoming">
          <span class="filter-icon">📅</span>
          <span class="filter-label">Upcoming</span>
          <span class="filter-count" id="count-upcoming">0</span>
        </button>
        <button type="button" class="filter-btn" data-filter="completed">
          <span class="filter-icon">✅</span>
          <span class="filter-label">Completed</span>
          <span class="filter-count" id="count-completed">0</span>
        </button>
      </nav>

      <div class="stats-card">
        <h2>Today's Progress</h2>
        <div class="progress-ring-wrap">
          <svg class="progress-ring" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="progress-ring-bg" cx="50" cy="50" r="42"/>
            <circle class="progress-ring-fill" id="progress-ring" cx="50" cy="50" r="42"/>
          </svg>
          <span class="progress-text" id="progress-text">0%</span>
        </div>
        <p class="stats-detail" id="stats-detail">0 of 0 tasks done</p>
      </div>
    </aside>

    <main class="main">
      <form class="add-form" id="add-form">
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="What needs to be done?"
          autocomplete="off"
          maxlength="200"
          required
        >
        <select id="priority-select" class="priority-select" aria-label="Priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <input type="date" id="due-date" class="due-date-input" aria-label="Due date">
        <button type="submit" class="btn btn-primary">Add Task</button>
      </form>

      <div class="search-bar">
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="Search tasks..."
          aria-label="Search tasks"
        >
      </div>

      <ul class="task-list" id="task-list" aria-live="polite"></ul>

      <div class="empty-state hidden" id="empty-state">
        <div class="empty-icon">🎯</div>
        <h3 id="empty-title">No tasks for today</h3>
        <p id="empty-message">Add a task above to get started. Focus on what matters most today.</p>
      </div>
    </main>
  </div>

  <div class="modal hidden" id="edit-modal" role="dialog" aria-labelledby="edit-modal-title" aria-modal="true">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
      <h2 id="edit-modal-title">Edit Task</h2>
      <form id="edit-form">
        <label class="field-label" for="edit-title">Title</label>
        <input type="text" id="edit-title" class="field-input" required maxlength="200">

        <label class="field-label" for="edit-notes">Notes</label>
        <textarea id="edit-notes" class="field-textarea" rows="3" maxlength="500" placeholder="Optional details..."></textarea>

        <div class="field-row">
          <div>
            <label class="field-label" for="edit-priority">Priority</label>
            <select id="edit-priority" class="field-input">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div>
            <label class="field-label" for="edit-due-date">Due Date</label>
            <input type="date" id="edit-due-date" class="field-input">
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="cancel-edit">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
